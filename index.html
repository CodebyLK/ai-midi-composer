<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Composer Pro</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>AI Composer Pro</h2>
        </div>

        <div class="sidebar-content">
            <h3 class="section-title">Audio Input</h3>
            <button id="record-btn" class="btn btn-danger" style="margin-bottom: 8px;">Record Real Piano</button>
            <div style="text-align: center; height: 20px;">
                <span id="recording-status" style="display:none; color: var(--danger); font-size: 0.75rem; font-weight: 600;">Recording...</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 24px;">
                <h3 class="section-title">Version History</h3>
                <span id="save-status" style="color: var(--success); font-size: 0.75rem; display: none;">Saved</span>
            </div>

            <ul id="history-list" style="list-style: none; padding: 0; margin: 10px 0 0 0; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1;">
            </ul>
        </div>
    </aside>

    <main class="main-workspace">

        <header class="top-header">
            <div style="display: flex; gap: 12px;">
                <button id="play-btn" class="btn btn-success">Play</button>
                <button id="clear-btn" class="btn btn-secondary">Clear</button>
                <button id="export-btn" class="btn btn-secondary" disabled>Export MIDI</button>
            </div>

            <div style="font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 24px; font-variant-numeric: tabular-nums;">
                <span>Notes: <strong id="stat-notes" style="color: var(--text-main);">0</strong></span>
                <span>Duration: <strong id="stat-duration" style="color: var(--text-main);">0s</strong></span>
            </div>
        </header>

        <div class="control-bar">

            <div class="input-group" style="flex: 1; min-width: 200px;">
                <label for="prompt-input">AI Prompt</label>
                <input type="text" id="prompt-input" placeholder="e.g., A dramatic progression in C minor..." />
            </div>

            <div class="input-group" style="width: 120px;">
                <label for="draw-tool">Draw Tool</label>
                <select id="draw-tool">
                    <option value="single">Single Note</option>
                    <option value="major">Major Triad</option>
                    <option value="minor">Minor Triad</option>
                    <option value="octave">Octave</option>
                </select>
            </div>

            <div class="input-group" style="width: 110px;">
                <label for="draw-size">Note Size</label>
                <select id="draw-size">
                    <option value="0.25">16th Note</option>
                    <option value="0.5">8th Note</option>
                    <option value="1" selected>Quarter</option>
                    <option value="2">Half Note</option>
                    <option value="4">Whole Note</option>
                </select>
            </div>

            <div class="input-group" style="width: 90px;">
                <label for="length-select">Length</label>
                <select id="length-select">
                    <option value="4 bars">4 Bars</option>
                    <option value="8 bars" selected>8 Bars</option>
                    <option value="16 bars">16 Bars</option>
                </select>
            </div>

            <div class="input-group" style="width: 140px;">
                <label for="instrument-select">Instrument</label>
                <select id="instrument-select">
                    <option value="1" selected>Acoustic Piano</option>
                    <option value="25">Acoustic Guitar</option>
                    <option value="40">Synth Bass</option>
                    <option value="41">Violin</option>
                    <option value="57">Trumpet</option>
                    <option value="74">Flute</option>
                </select>
            </div>

            <div class="input-group" style="width: 120px;">
                <label for="tempo-slider">BPM: <span id="tempo-display">120</span></label>
                <div style="height: 36px; display: flex; align-items: center;">
                    <input type="range" id="tempo-slider" min="60" max="200" value="120" style="width: 100%; margin: 0;" />
                </div>
            </div>

            <div style="display: flex; gap: 8px;">
                <button id="generate-btn" class="btn btn-primary">Generate</button>
                <button id="append-btn" class="btn btn-success" disabled>Append</button>
            </div>
        </div>

        <div class="workspace-area">
            <div class="piano-roll-container">
                <div id="piano-keyboard"></div>
                <div id="visualizer-viewport">
                    <div id="playhead"></div>
                    <div id="visualizer-canvas"></div>
                </div>
            </div>
        </div>

    </main>
</div>

<script type="module" src="./src/main.ts"></script>
</body>
</html>
