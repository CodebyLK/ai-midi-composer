<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Composer</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #121217;">

<div style="display: flex; height: 100vh; width: 100vw; font-family: system-ui, sans-serif; color: white;">

    <aside style="width: 260px; border-right: 1px solid #333; background: #1a1a24; display: flex; flex-direction: column;">
        <div style="padding: 20px; border-bottom: 1px solid #333;">
            <h2 style="margin: 0; color: #646cff; font-size: 1.2rem;">AI Composer Pro</h2>
        </div>

        <div style="padding: 20px; flex: 1;">
            <h3 style="margin-top: 0; font-size: 0.9rem; color: #888; text-transform: uppercase;">Audio Input</h3>
            <button id="record-btn" style="width: 100%; margin-bottom: 10px;">🎤 Record Real Piano</button>
            <div style="text-align: center; height: 20px;">
                <span id="recording-status" style="display:none; color: #ff4757; font-weight: bold; font-size: 0.9rem;">🔴 Recording...</span>
            </div>

            <h3 style="margin-top: 20px; font-size: 0.9rem; color: #888; text-transform: uppercase;">Session</h3>
            <div id="save-status" style="color: #00b894; font-size: 0.8rem; display: none;">✓ Auto-saved to Workspace</div>
        </div>
    </aside>

    <main style="flex: 1; display: flex; flex-direction: column; background-color: #1e1e24;">

        <header style="padding: 15px 25px; background: #1a1a24; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; gap: 15px; align-items: center;">
                <button id="play-btn">▶ Play</button>
                <button id="clear-btn">🗑 Clear</button>
                <button id="export-btn" disabled>⬇ Download MIDI</button>
            </div>

            <div style="font-size: 0.9rem; color: #aaa; display: flex; gap: 20px;">
                <span>📊 Notes: <strong id="stat-notes" style="color: white;">0</strong></span>
                <span>⏱️ Duration: <strong id="stat-duration" style="color: white;">0s</strong></span>
            </div>
        </header>

        <div style="padding: 15px 25px; background: #23232b; display: flex; gap: 20px; align-items: flex-end; border-bottom: 1px solid #333; flex-wrap: nowrap;">

            <div style="display:flex; flex-direction:column; flex: 1; min-width: 200px;">
                <label for="prompt-input" style="font-size: 0.8rem; color: #888; margin-bottom: 6px;">AI Composition Prompt</label>
                <input type="text" id="prompt-input" placeholder="e.g., A dramatic chord progression..." />
            </div>

            <div style="display:flex; flex-direction:column; width: 110px; flex-shrink: 0;">
                <label for="draw-size" style="font-size: 0.8rem; color: #888; margin-bottom: 6px;">Draw Size</label>
                <select id="draw-size" style="padding: 10px; border-radius: 4px; background: #2a2a35; color: white; border: 1px solid #444;">
                    <option value="0.25">16th Note</option>
                    <option value="0.5">8th Note</option>
                    <option value="1" selected>Quarter</option>
                    <option value="2">Half Note</option>
                    <option value="4">Whole Note</option>
                </select>
            </div>

            <div style="display:flex; flex-direction:column; width: 100px; flex-shrink: 0;">
                <label for="length-select" style="font-size: 0.8rem; color: #888; margin-bottom: 6px;">Length</label>
                <select id="length-select" style="padding: 10px; border-radius: 4px; background: #2a2a35; color: white; border: 1px solid #444;">
                    <option value="4 bars">4 Bars</option>
                    <option value="8 bars" selected>8 Bars</option>
                    <option value="16 bars">16 Bars</option>
                </select>
            </div>

            <div style="display:flex; flex-direction:column; width: 140px; flex-shrink: 0;">
                <label for="instrument-select" style="font-size: 0.8rem; color: #888; margin-bottom: 6px;">Instrument</label>
                <select id="instrument-select" style="padding: 10px; border-radius: 4px; background: #2a2a35; color: white; border: 1px solid #444;">
                    <option value="1" selected>Acoustic Piano</option>
                    <option value="40">Synth Bass</option>
                </select>
            </div>

            <div style="display:flex; flex-direction:column; width: 140px; flex-shrink: 0;">
                <label for="tempo-slider" style="font-size: 0.8rem; color: #888; margin-bottom: 6px;">BPM: <span id="tempo-display">120</span></label>
                <div style="background: #2a2a35; padding: 8px 10px; border-radius: 4px; border: 1px solid #444; display: flex; align-items: center;">
                    <input type="range" id="tempo-slider" min="60" max="200" value="120" style="width: 100%;" />
                </div>
            </div>

            <div style="display: flex; gap: 10px; flex-shrink: 0; align-items: flex-end;">
                <button id="generate-btn" style="height: 42px; padding: 0 15px; background: #646cff; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold;">✨ New</button>
                <button id="append-btn" style="height: 42px; padding: 0 15px; background: #00b894; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold;" disabled>➕ Append</button>
            </div>
        </div>

        <div style="flex: 1; padding: 25px; overflow: hidden; display: flex; flex-direction: column;">
            <div id="visualizer-viewport" style="flex: 1; width: 100%; max-width: 100%; margin: 0;">
                <div id="playhead"></div>
                <div id="visualizer-canvas"></div>
            </div>
        </div>

    </main>
</div>

<script type="module" src="./src/main.ts"></script>
</body>
</html>
